name: CI

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main, release/**]
  workflow_dispatch:

jobs:
  verify_files:
    name: Verify Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install Packages
        run: pnpm run ci:install
      - name: Lint Files
        run: pnpm run lint

  tests:
    # Split per jest project so they run on parallel runners and failures are isolated.
    # Kept as --runInBand: on 2-vCPU runners the worker pool is slower than serial.
    name: Test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [apex-log-parser, log-viewer, lana]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install Packages
        run: pnpm run ci:install
      - name: Tests
        run: pnpm exec jest --selectProjects ${{ matrix.project }} --runInBand

  build:
    name: Verify VSCode Package Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install vsce
        run: pnpm add --global @vscode/vsce
      - name: Install Dependencies
        run: pnpm run ci:install
      - name: Build VSCode Package
        run: |
          cd lana
          vsce package --no-dependencies
